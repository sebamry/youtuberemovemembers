<ytd-shelf-renderer id="members-shelf" class="style-scope ytd-item-section-renderer">
  <div id="dismissible" class="style-scope ytd-shelf-renderer">
    <div class="grid-subheader style-scope ytd-shelf-renderer">
      <div id="title-container" class="style-scope ytd-shelf-renderer">
        <h2 class="style-scope ytd-shelf-renderer">
          <a class="yt-simple-endpoint style-scope ytd-shelf-renderer" href="/playlist?list=UUMOCKLIST">
            <span id="title" class="style-scope ytd-shelf-renderer">Localized title ignored</span>
          </a>
        </h2>
      </div>
    </div>
    <div id="contents" class="style-scope ytd-shelf-renderer">
      <ytd-grid-video-renderer id="member-card-1">
        <a id="thumbnail" href="/watch?v=member1111111"></a>
        <div id="details">
          <div id="meta">
            <h3>
              <a id="video-title" href="/watch?v=member1111111">Member video one</a>
            </h3>
            <div id="metadata-container">
              <div id="metadata">
                <ytd-badge-supported-renderer id="video-badges">
                  <div class="badge-shape style-scope ytd-badge-supported-renderer">
                    <badge-shape
                      class="yt-badge-shape yt-badge-shape--membership yt-badge-shape--typography"
                      role="img"
                      aria-label="Members only"
                    >
                      <div class="yt-badge-shape__text">Members only</div>
                    </badge-shape>
                  </div>
                </ytd-badge-supported-renderer>
              </div>
            </div>
          </div>
        </div>
      </ytd-grid-video-renderer>
      <ytd-grid-video-renderer id="member-card-2">
        <a id="thumbnail" href="/watch?v=member2222222"></a>
        <div id="details">
          <div id="meta">
            <h3>
              <a id="video-title" href="/watch?v=member2222222">Member video two</a>
            </h3>
            <div id="metadata-container">
              <div id="metadata">
                <ytd-badge-supported-renderer id="video-badges">
                  <div class="badge-shape style-scope ytd-badge-supported-renderer">
                    <badge-shape
                      class="yt-badge-shape yt-badge-shape--membership yt-badge-shape--typography"
                      role="img"
                      aria-label="Members first"
                    >
                      <div class="yt-badge-shape__text">Members first</div>
                    </badge-shape>
                  </div>
                </ytd-badge-supported-renderer>
              </div>
            </div>
          </div>
        </div>
      </ytd-grid-video-renderer>
    </div>
  </div>
</ytd-shelf-renderer>
